[package]
name        = "kick-rs"
version     = "0.0.3"
description = "Module-driven web framework for Rust — a port of KickJS on axum"
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
repository.workspace   = true
authors.workspace      = true
readme      = "README.md"

[features]
default = []
# Re-exports `#[service]` (and friends) from `kick-rs-macros`. Opt-in
# because adopters who want the bare builder API don't need the
# proc-macro compile overhead.
macros = ["dep:kick-rs-macros"]

# The `config` and `assets` features are still parked — they'll land
# when `kick-rs-config` / `kick-rs-assets` reach publish-ready state
# (Phase 5). Adopters who need them early can depend on those crates
# directly via git.

[dependencies]
kick-rs-core   = { workspace = true }
kick-rs-http   = { workspace = true }
kick-rs-macros = { workspace = true, optional = true }
