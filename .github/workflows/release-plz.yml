# Release-plz — opens / updates a "Release PR" whenever there are
# unreleased commits, then publishes to crates.io and tags releases
# when the PR is merged.
#
# Required secrets:
#   * CARGO_REGISTRY_TOKEN — created on https://crates.io/me, scoped to
#     `publish-update`. Until rustkick is published once, this can be
#     omitted; release-plz will still open the Release PR with version
#     bumps + CHANGELOG updates, just skipping the publish step.
#
# Required repo permissions (already granted by `permissions:` below):
#   * contents: write       — to push the release commit and tag
#   * pull-requests: write  — to open / update the Release PR
#
# Workflow shape:
#   One job, default command (`release-pr release`). The release-plz
#   action figures out internally whether the current push is a regular
#   commit (→ open / update the Release PR) or the merge commit of a
#   Release PR (→ publish + tag). Splitting this into two jobs was
#   redundant and caused the publish step to run on every main push
#   instead of only on Release PR merges.
#
# See RELEASE.md for the full strategy.

name: release-plz

on:
  push:
    branches: [main]

concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-plz:
    name: release-plz
    runs-on: ubuntu-latest
    if: ${{ github.repository == 'forinda/rustkick' }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history is required so release-plz can walk commits
          # for changelog generation.
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz
        uses: release-plz/action@v0.5
        # No `command:` input — defaults to "release-pr release", which
        # opens/updates the Release PR on regular pushes and publishes
        # on Release PR merge commits. The action no-ops the publish
        # step gracefully when CARGO_REGISTRY_TOKEN isn't set.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
