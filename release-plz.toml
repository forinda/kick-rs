# release-plz configuration. See https://release-plz.dev/docs.
#
# How this repo releases:
#  * Independent versioning per crate — `kick-rs-core` can ship 0.2.0 while
#    `kick-rs-http` stays at 0.1.3. The umbrella `kick-rs` crate's deps
#    on the others are bumped automatically by release-plz when it cuts
#    each Release PR.
#  * Conventional Commits drive semver bumps:
#      feat(…):  minor bump
#      fix(…):   patch bump
#      docs/chore/refactor/test/ci/build: patch (or skipped if no code)
#      `!` or `BREAKING CHANGE`: major bump (still 0.x → 0.minor while < 1.0)
#  * Per-crate CHANGELOG.md is updated next to each crate's Cargo.toml.
#  * Git tags are `<crate>-v<version>` (e.g. `kick-rs-core-v0.1.0`).
#  * The example crate under examples/ is excluded from the workspace and
#    has `publish = false`, so it's invisible to release-plz.
#
# See `RELEASE.md` for the high-level strategy and the secrets the GitHub
# Action expects.

[workspace]
# Open / update the Release PR whenever pending commits are detected.
# Keeps a single open PR with the cumulative diff — merge to ship.
release_always = true

# Bump the workspace.dependencies inter-crate version pins automatically
# so consumers (umbrella crate, examples) line up with the latest cut.
dependencies_update = true

# Use a per-crate CHANGELOG.md file (the default), updated in the
# Release PR's commit.
changelog_update = true

# Don't allow releasing from a dirty tree.
allow_dirty = false

# Use git-cliff-style template for changelog rendering. Default is fine
# for our purposes — section per commit type, link to commit + PR.

# ── Per-crate overrides ──────────────────────────────────────────────────
#
# Releasable crates: every crate whose Cargo.toml does NOT carry
# `publish = false`. As of now: kick-rs-core, kick-rs-http,
# kick-rs-macros, kick-rs-config, kick-rs-cli, kick-rs-assets, and
# the umbrella `kick-rs`. The order matters: the umbrella `kick-rs`
# depends on the optional crates by version, so each of them must
# reach crates.io before the umbrella can publish a version that
# names them.

[[package]]
name = "kick-rs-core"
git_tag_name = "kick-rs-core-v{{ version }}"

[[package]]
name = "kick-rs-http"
git_tag_name = "kick-rs-http-v{{ version }}"

[[package]]
name = "kick-rs-macros"
git_tag_name = "kick-rs-macros-v{{ version }}"

[[package]]
name = "kick-rs-config"
git_tag_name = "kick-rs-config-v{{ version }}"

[[package]]
name = "kick-rs-cli"
git_tag_name = "kick-rs-cli-v{{ version }}"

[[package]]
name = "kick-rs"
git_tag_name = "kick-rs-v{{ version }}"

[[package]]
name = "kick-rs-assets"
git_tag_name = "kick-rs-assets-v{{ version }}"

[[package]]
name = "kick-rs-assets-macros"
git_tag_name = "kick-rs-assets-macros-v{{ version }}"

# ── Gated (placeholders, not yet ready to publish) ───────────────────────
#
# Cargo.toml carries `publish = false`; release-plz requires both
# fields to match — Cargo.toml says "don't publish", release-plz config
# must explicitly acknowledge that. Otherwise the `release-publish`
# job aborts with a config-mismatch error.
#
# (none right now — every workspace member is publishable.)
