services:
  db:
    image: postgres:16-alpine
    container_name: users-api-db
    environment:
      POSTGRES_USER:     users
      POSTGRES_PASSWORD: users
      POSTGRES_DB:       users_api
    ports:
      - "5432:5432"
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U users -d users_api"]
      interval: 2s
      timeout:  3s
      retries:  20
    volumes:
      - db-data:/var/lib/postgresql/data

volumes:
  db-data:
